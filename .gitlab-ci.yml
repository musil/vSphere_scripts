stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.22"
  SSO_USERS_APP_DIR: "apps/sso-users"

.sso-users-go-job:
  image: "golang:${GO_VERSION}"
  before_script:
    - go version

sso-users:test:
  extends: .sso-users-go-job
  stage: test
  rules:
    - if: '$CI_COMMIT_TAG =~ /^sso-users\/v[0-9]+\.[0-9]+\.[0-9]+$/'
    - changes:
        - .gitlab-ci.yml
        - apps/sso-users/**/*
  script:
    - cd "$SSO_USERS_APP_DIR"
    - make check

sso-users:release-build:
  extends: .sso-users-go-job
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^sso-users\/v[0-9]+\.[0-9]+\.[0-9]+$/'
  needs:
    - job: sso-users:test
  script:
    - cd "$SSO_USERS_APP_DIR"
    - VERSION="${CI_COMMIT_TAG#sso-users/v}"
    - test "$(cat VERSION)" = "$VERSION" || { echo "VERSION must match tag ${CI_COMMIT_TAG}" >&2; exit 1; }
    - bash ./scripts/build-release.sh "$VERSION"
    - printf 'SSO_USERS_VERSION=%s\n' "$VERSION" > dist/release.env
    - printf 'SSO_USERS_ARTIFACT_BASE_URL=%s\n' "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/${SSO_USERS_APP_DIR}/dist" >> dist/release.env
  artifacts:
    paths:
      - apps/sso-users/dist/
    reports:
      dotenv: apps/sso-users/dist/release.env
    expire_in: never

sso-users:release:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^sso-users\/v[0-9]+\.[0-9]+\.[0-9]+$/'
  needs:
    - job: sso-users:release-build
      artifacts: true
  script:
    - |
      set -euo pipefail
      release_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      description="Prebuilt sso-users binaries for darwin/arm64, linux/amd64, and windows/amd64. Verify downloads with checksums.txt."
      curl --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data-urlencode "name=sso-users ${SSO_USERS_VERSION}" \
        --data-urlencode "tag_name=${CI_COMMIT_TAG}" \
        --data-urlencode "description=${description}" \
        --data-urlencode "assets[links][][name]=sso-users_${SSO_USERS_VERSION}_darwin_arm64.tar.gz" \
        --data-urlencode "assets[links][][url]=${SSO_USERS_ARTIFACT_BASE_URL}/sso-users_${SSO_USERS_VERSION}_darwin_arm64.tar.gz" \
        --data-urlencode "assets[links][][link_type]=package" \
        --data-urlencode "assets[links][][name]=sso-users_${SSO_USERS_VERSION}_linux_amd64.tar.gz" \
        --data-urlencode "assets[links][][url]=${SSO_USERS_ARTIFACT_BASE_URL}/sso-users_${SSO_USERS_VERSION}_linux_amd64.tar.gz" \
        --data-urlencode "assets[links][][link_type]=package" \
        --data-urlencode "assets[links][][name]=sso-users_${SSO_USERS_VERSION}_windows_amd64.zip" \
        --data-urlencode "assets[links][][url]=${SSO_USERS_ARTIFACT_BASE_URL}/sso-users_${SSO_USERS_VERSION}_windows_amd64.zip" \
        --data-urlencode "assets[links][][link_type]=package" \
        --data-urlencode "assets[links][][name]=checksums.txt" \
        --data-urlencode "assets[links][][url]=${SSO_USERS_ARTIFACT_BASE_URL}/checksums.txt" \
        --data-urlencode "assets[links][][link_type]=other" \
        "$release_url"