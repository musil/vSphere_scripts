stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.22"
  SSO_USERS_APP_DIR: "apps/sso-users"

.sso-users-go-job:
  image: "golang:${GO_VERSION}"
  before_script:
    - go version

sso-users:test:
  extends: .sso-users-go-job
  stage: test
  rules:
    - if: '$CI_COMMIT_TAG =~ /^sso-users\/v[0-9]+\.[0-9]+\.[0-9]+$/'
    - changes:
        - .gitlab-ci.yml
        - apps/sso-users/**/*
  script:
    - cd "$SSO_USERS_APP_DIR"
    - make check

sso-users:release-build:
  extends: .sso-users-go-job
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^sso-users\/v[0-9]+\.[0-9]+\.[0-9]+$/'
  needs:
    - job: sso-users:test
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends zip
    - cd "$SSO_USERS_APP_DIR"
    - VERSION="${CI_COMMIT_TAG#sso-users/v}"
    - test "$(cat VERSION)" = "$VERSION" || { echo "VERSION must match tag ${CI_COMMIT_TAG}" >&2; exit 1; }
    - bash ./scripts/build-release.sh "$VERSION"
    - printf 'SSO_USERS_VERSION=%s\n' "$VERSION" > dist/release.env
    - printf 'SSO_USERS_ARTIFACT_BASE_URL=%s\n' "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/${SSO_USERS_APP_DIR}/dist" >> dist/release.env
  artifacts:
    paths:
      - apps/sso-users/dist/
    reports:
      dotenv: apps/sso-users/dist/release.env
    expire_in: never

sso-users:release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^sso-users\/v[0-9]+\.[0-9]+\.[0-9]+$/'
  needs:
    - job: sso-users:release-build
      artifacts: true
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "sso-users $SSO_USERS_VERSION"
    description: "Prebuilt sso-users binaries for darwin/arm64, linux/amd64, and windows/amd64. Verify downloads with checksums.txt."
    assets:
      links:
        - name: "sso-users_${SSO_USERS_VERSION}_darwin_arm64.tar.gz"
          url: "${SSO_USERS_ARTIFACT_BASE_URL}/sso-users_${SSO_USERS_VERSION}_darwin_arm64.tar.gz"
          link_type: package
        - name: "sso-users_${SSO_USERS_VERSION}_linux_amd64.tar.gz"
          url: "${SSO_USERS_ARTIFACT_BASE_URL}/sso-users_${SSO_USERS_VERSION}_linux_amd64.tar.gz"
          link_type: package
        - name: "sso-users_${SSO_USERS_VERSION}_windows_amd64.zip"
          url: "${SSO_USERS_ARTIFACT_BASE_URL}/sso-users_${SSO_USERS_VERSION}_windows_amd64.zip"
          link_type: package
        - name: "checksums.txt"
          url: "${SSO_USERS_ARTIFACT_BASE_URL}/checksums.txt"
          link_type: other